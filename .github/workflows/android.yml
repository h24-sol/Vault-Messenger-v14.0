name: Build Vault V14 APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Install Dependencies
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
      - name: Initialize Android Project
        run: |
          npx cap init "Vault V14" com.vault.v14 --web-dir=.
          npx cap add android
      - name: Set Android Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
      - name: Build APK
        run: |
          npx cap copy
          cd android && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Vault-V14-Official-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
