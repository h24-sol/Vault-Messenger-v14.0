<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Messenger v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        #matrixCanvas { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="lockScreen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6 text-center">
        <div>
            <h1 class="text-2xl font-black italic mb-6">VAULT TERMINAL</h1>
            <input type="password" id="pinDisplay" placeholder="••••" readonly class="w-40 bg-black/60 border border-cyan-500/30 rounded-2xl p-4 text-3xl text-cyan-400 text-center outline-none mb-8">
            <div class="grid grid-cols-3 gap-3 max-w-[280px] mx-auto">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<button onclick="press('${i}')" class="bg-white/5 py-5 rounded-2xl font-bold">${i}</button>`);
                </script>
                <button onclick="clearPin()" class="bg-red-500/10 text-red-500 py-5 rounded-2xl">✕</button>
                <button onclick="press('0')" class="bg-white/5 py-5 rounded-2xl">0</button>
                <button onclick="verify()" class="bg-cyan-500 text-black py-5 rounded-2xl font-black">OK</button>
            </div>
        </div>
    </div>
    <div id="appContainer" class="hidden w-full max-w-[450px] glass rounded-[2.5rem] p-8 shadow-2xl">
        <h1 class="text-xl font-black text-center mb-6 italic uppercase">Vault Messenger <span class="text-cyan-500">v14</span></h1>
        <div class="grid grid-cols-2 gap-2 mb-6 text-center text-[10px] font-black">
            <label class="bg-black/40 p-3 rounded-xl border border-white/5 cursor-pointer">
                SHADOW IMAGE <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="handleImg(this)">
            </label>
            <div class="bg-black/40 p-3 rounded-xl border border-white/5">
                SHIFT: <input type="number" id="shift" value="12" class="bg-transparent text-cyan-400 outline-none w-8">
            </div>
        </div>
        <textarea id="msgInput" placeholder="বার্তা লিখুন..." class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 h-32 mb-6 outline-none text-sm"></textarea>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="run('enc')" class="bg-cyan-500 text-black py-4 rounded-xl font-black uppercase text-xs">Encrypt</button>
            <button onclick="run('dec')" class="bg-slate-800 text-white py-4 rounded-xl font-black uppercase text-xs">Decrypt</button>
        </div>
        <div id="resArea" class="hidden mt-6 p-4 bg-white/5 rounded-2xl">
            <p id="resText" class="text-center break-all text-xs mb-4 text-cyan-200"></p>
            <img id="resImg" class="w-full rounded-lg">
            <button onclick="save()" class="w-full mt-4 bg-white text-black py-2 rounded-lg font-black text-[10px]">SAVE TO DEVICE</button>
        </div>
    </div>

    <div id="payModal" class="hidden fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-6 text-center">
        <div class="glass p-8 rounded-[2rem] w-full max-w-xs">
            <h2 class="text-cyan-500 font-black mb-4">DECRYPTION LOCKED</h2>
            <p class="text-[10px] mb-6">Payment required to unlock Shadow Decryption</p>
            <button onclick="showTrx('bKash: 01774460656')" class="w-full bg-[#D12053] py-3 rounded-xl mb-2 font-bold">bKash</button>
            <div id="trxInputArea" class="hidden mt-4">
                <p id="addr" class="text-[10px] mb-4 text-slate-400"></p>
                <input type="text" id="trxId" placeholder="TRX ID" class="w-full bg-black border border-slate-700 p-3 rounded-xl text-center mb-4">
                <button onclick="submitTrx()" class="w-full bg-cyan-500 text-black py-3 rounded-xl font-black">SUBMIT</button>
            </div>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhTOWBvfqDvmDW03FOF5OqEq8HRv5dMME",
            authDomain: "vault-messenger-fcb60.firebaseapp.com",
            projectId: "vault-messenger-fcb60",
            databaseURL: "https://vault-messenger-fcb60-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPin = "", shadow = null, paid = false;

        function press(n) { if(currentPin.length < 4) currentPin += n; document.getElementById('pinDisplay').value = currentPin; }
        function clearPin() { currentPin = ""; document.getElementById('pinDisplay').value = ""; }
        function verify() {
            let saved = localStorage.getItem('v14_pin');
            if(!saved) { localStorage.setItem('v14_pin', currentPin); location.reload(); }
            else if(currentPin === saved) { document.getElementById('lockScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden'); }
            else { alert("WRONG PIN"); clearPin(); }
        }

        function handleImg(i) {
            const r = new FileReader();
            r.onload = (e) => shadow = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        async function run(mode) {
            if(mode === 'dec' && shadow && !paid) { document.getElementById('payModal').classList.remove('hidden'); return; }
            const shift = parseInt(document.getElementById('shift').value);
            const input = document.getElementById('msgInput').value;
            const resArea = document.getElementById('resArea');
            resArea.classList.remove('hidden');

            if(shadow) {
                const img = new Image(); img.src = shadow;
                await new Promise(r => img.onload = r);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0,0,cvs.width,cvs.height);
                let seed = shift;
                for(let i=0; i<d.data.length; i+=4) {
                    d.data[i] ^= (seed % 255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(d, 0, 0);
                document.getElementById('resImg').src = cvs.toDataURL();
                document.getElementById('resText').innerText = "SHADOW PROCESSED";
            } else {
                const s = mode === 'enc' ? shift : -shift;
                const out = input.split('').map(c => String.fromCharCode(c.charCodeAt(0) + s)).join('');
                document.getElementById('resText').innerText = out;
                document.getElementById('resImg').src = "";
            }
        }

        function showTrx(a) { document.getElementById('addr').innerText = a; document.getElementById('trxInputArea').classList.remove('hidden'); }
        function submitTrx() {
            const trx = document.getElementById('trxId').value;
            const ref = db.ref('payments').push();
            ref.set({ trx, status: 'pending' });
            ref.on('value', s => { if(s.val()?.status === 'approved') { paid = true; document.getElementById('payModal').classList.add('hidden'); run('dec'); } });
            alert("Sent to admin for approval.");
        }
        function save() {
            const img = document.getElementById('resImg').src;
            if(img) { const a = document.createElement('a'); a.href = img; a.download = "vault.png"; a.click(); }
            else { navigator.clipboard.writeText(document.getElementById('resText').innerText); alert("COPIED"); }
        }
    </script>
</body>
</html>
