<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Messenger v14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        #matrixCanvas { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="lockScreen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <img src="logo.png" class="w-24 h-24 mx-auto mb-6 rounded-3xl shadow-2xl border border-cyan-500/30" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2092/2092663.png'">
            <h1 class="text-2xl font-black italic tracking-widest mb-6">VAULT TERMINAL</h1>
            <input type="password" id="pinDisplay" maxlength="4" placeholder="••••" readonly class="w-40 bg-black/60 border border-cyan-500/30 rounded-2xl p-4 text-3xl font-black text-cyan-400 text-center outline-none mb-8">
            <div class="grid grid-cols-3 gap-3 max-w-[280px] mx-auto">
                <script>
                    for(let i=1; i<=9; i++) document.write(`<button onclick="press('${i}')" class="bg-white/5 py-5 rounded-2xl font-bold text-xl active:bg-cyan-500 transition-all">${i}</button>`);
                </script>
                <button onclick="clearPin()" class="bg-red-500/10 text-red-500 py-5 rounded-2xl font-bold text-xl">✕</button>
                <button onclick="press('0')" class="bg-white/5 py-5 rounded-2xl font-bold text-xl">0</button>
                <button onclick="verify()" class="bg-cyan-500 text-black py-5 rounded-2xl font-black uppercase shadow-lg shadow-cyan-500/50">OK</button>
            </div>
        </div>
    </div>

    <div id="appContainer" class="hidden w-full max-w-[480px] glass rounded-[2.5rem] p-8 shadow-2xl border-white/5">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-black italic uppercase">Vault Messenger <span class="text-cyan-500">v14</span></h1>
        </div>

        <div class="grid grid-cols-4 gap-2 mb-6">
            <div class="bg-black/60 p-2 rounded-xl border border-white/5 text-center">
                <span class="text-[7px] block text-slate-500 font-black mb-1">SHIFT</span>
                <input type="number" id="shift" value="12" class="bg-transparent w-full text-center font-black text-cyan-400 outline-none text-xs">
            </div>
            <label class="bg-black/60 p-2 rounded-xl border border-white/5 text-center cursor-pointer">
                <span class="text-[7px] block text-slate-500 font-black mb-1">SHADOW</span>
                <span id="shadowStat" class="text-[9px] font-black text-white">UPLOAD</span>
                <input type="file" id="imgInput" class="hidden" accept="image/*" onchange="handleShadow(this)">
            </label>
            <div class="bg-black/60 p-2 rounded-xl border border-white/5 text-center opacity-30">
                <span class="text-[7px] block text-slate-500 font-black mb-1">GHOST</span>
                <span class="text-[9px] font-black text-red-500">OFF</span>
            </div>
            <div class="bg-black/60 p-2 rounded-xl border border-white/5 text-center opacity-30">
                <span class="text-[7px] block text-slate-500 font-black mb-1">DECOY</span>
                <span class="text-[9px] font-black text-cyan-500">AI</span>
            </div>
        </div>

        <textarea id="msgInput" placeholder="এখানে আপনার গোপন বার্তা লিখুন..." class="w-full bg-black/40 border border-slate-800 rounded-2xl p-5 h-36 mb-6 outline-none focus:border-cyan-500/50 text-slate-200 text-sm resize-none"></textarea>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="run('enc')" class="bg-cyan-500 text-black py-4 rounded-xl font-black uppercase text-xs">Encrypt</button>
            <button onclick="run('dec')" class="bg-slate-800 text-white py-4 rounded-xl font-black uppercase text-xs">Decrypt</button>
        </div>

        <div id="resArea" class="hidden mt-6 p-5 bg-cyan-500/5 rounded-3xl border border-cyan-500/10">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[8px] font-black text-cyan-400 tracking-widest">OUTPUT TERMINAL</span>
                <button id="copyBtn" class="bg-white text-black px-4 py-1.5 rounded-full text-[9px] font-black">SAVE</button>
            </div>
            <p id="resText" class="text-center break-all mb-4 text-white text-sm font-medium"></p>
            <div id="imgBox" class="hidden rounded-2xl overflow-hidden border border-cyan-500/20 shadow-lg">
                <img id="resImg" class="w-full">
            </div>
        </div>
    </div>

    <div id="payModal" class="hidden fixed inset-0 z-[200] bg-black/98 flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-10 rounded-[3rem] text-center">
            <h2 class="text-xl font-black text-cyan-400 mb-2 uppercase italic">Shadow Locked</h2>
            <p class="text-[9px] text-slate-500 mb-8 font-black uppercase tracking-[0.2em]">Protocol Activation Required</p>
            <div class="space-y-3" id="payOptions">
                <button onclick="pay('bKash','01774460656')" class="w-full bg-[#D12053] py-5 rounded-2xl font-bold text-white shadow-lg">bKash</button>
                <button onclick="pay('Nagad','01774460656')" class="w-full bg-[#F7941D] py-5 rounded-2xl font-bold text-white shadow-lg">Nagad</button>
                <button onclick="pay('Solana','HBxdLgDcfHr8cdZuG5K2mKhr3XxLjWH2yrFS7Pg7mg9Q')" class="w-full bg-gradient-to-r from-purple-600 to-emerald-400 py-5 rounded-2xl font-black text-black shadow-lg">SOLANA</button>
            </div>
            <div id="trxUI" class="hidden mt-4">
                <p id="targetAddr" class="text-[10px] bg-white/5 p-4 rounded-xl mb-4 break-all select-all font-mono text-cyan-300 border border-white/5"></p>
                <input type="text" id="trxId" placeholder="TRX ID / SIGNATURE" class="w-full bg-black border border-slate-700 p-4 rounded-xl text-center mb-4 text-cyan-500 uppercase font-bold text-xs outline-none focus:border-cyan-500">
                <button onclick="submitTrx()" class="w-full bg-cyan-500 text-black py-4 rounded-xl font-black uppercase text-xs shadow-lg shadow-cyan-500/20">Verify Access</button>
            </div>
            <button onclick="location.reload()" class="mt-8 text-[9px] text-slate-600 uppercase font-black tracking-widest">Abort</button>
        </div>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBhTOWBvfqDvmDW03FOF5OqEq8HRv5dMME",
            authDomain: "vault-messenger-fcb60.firebaseapp.com",
            projectId: "vault-messenger-fcb60",
            storageBucket: "vault-messenger-fcb60.firebasestorage.app",
            messagingSenderId: "821728049314",
            appId: "1:821728049314:web:54d5b101d52b4e89613ffb",
            databaseURL: "https://vault-messenger-fcb60-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let storedPin = localStorage.getItem('v14_pin'), currentPinInput = "", shadowData = null, isPaid = false;

        function press(n) { if(currentPinInput.length < 4) { currentPinInput += n; document.getElementById('pinDisplay').value = currentPinInput; } }
        function clearPin() { currentPinInput = ""; document.getElementById('pinDisplay').value = ""; }
        function verify() {
            if(!storedPin) { localStorage.setItem('v14_pin', currentPinInput); location.reload(); }
            else if(currentPinInput === storedPin) { document.getElementById('lockScreen').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden'); }
            else { alert("ACCESS DENIED"); clearPin(); }
        }

        function handleShadow(i) {
            const r = new FileReader();
            r.onload = (e) => { 
                shadowData = e.target.result; 
                const s = document.getElementById('shadowStat');
                s.innerText = "READY"; s.style.color = "#22d3ee"; 
            };
            r.readAsDataURL(i.files[0]);
        }

        async function run(mode) {
            const shift = parseInt(document.getElementById('shift').value) || 12;
            const input = document.getElementById('msgInput').value;
            if(mode === 'dec' && shadowData && !isPaid) { document.getElementById('payModal').classList.remove('hidden'); return; }

            if(shadowData) {
                const img = new Image(); img.src = shadowData;
                await new Promise(res => img.onload = res);
                const cvs = document.getElementById('matrixCanvas');
                const ctx = cvs.getContext('2d');
                cvs.width = img.width; cvs.height = img.height;
                ctx.drawImage(img, 0, 0);
                const d = ctx.getImageData(0,0,cvs.width,cvs.height);
                const p = d.data;
                let seed = shift;
                for(let i=0; i<p.length; i+=4) {
                    p[i] ^= (seed % 255); p[i+1] ^= ((seed*2)%255); p[i+2] ^= ((seed*3)%255);
                    seed = (seed * 16807) % 2147483647;
                }
                ctx.putImageData(d, 0, 0);
                const url = cvs.toDataURL("image/png");
                document.getElementById('resImg').src = url;
                document.getElementById('imgBox').classList.remove('hidden');
                document.getElementById('resText').innerText = "SHADOW MATRIX GENERATED";
                document.getElementById('copyBtn').onclick = () => {
                    const a = document.createElement('a'); a.href = url; a.download = `VAULT_${Date.now()}.png`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                };
            } else {
                const s = mode === 'dec' ? -shift : shift;
                const out = input.split('').map(c => String.fromCharCode(c.charCodeAt(0) + (c === ' ' ? 0 : s))).join('');
                document.getElementById('resText').innerText = out;
                document.getElementById('imgBox').classList.add('hidden');
                document.getElementById('copyBtn').onclick = () => { navigator.clipboard.writeText(out); alert("SAVED"); };
            }
            document.getElementById('resArea').classList.remove('hidden');
        }

        function pay(method, addr) {
            document.getElementById('payOptions').classList.add('hidden');
            document.getElementById('trxUI').classList.remove('hidden');
            document.getElementById('targetAddr').innerText = addr;
        }

        function submitTrx() {
            const trx = document.getElementById('trxId').value;
            if(trx.length < 5) return alert("Enter valid TRX ID");
            const ref = db.ref('payments').push();
            ref.set({ trx, status: 'pending', time: Date.now() });
            ref.on('value', s => { if(s.val()?.status === 'approved') { isPaid = true; document.getElementById('payModal').classList.add('hidden'); run('dec'); } });
            alert("Sent to admin. Wait for approval.");
        }
    </script>
</body>
</html>
